<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 颜值体态研究室 | Pro版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 高级毛玻璃效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 平滑过渡 */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 炫酷扫描线动画 */
        .scan-container {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #ec4899, #8b5cf6, transparent);
            box-shadow: 0 0 15px #ec4899;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
    </style>
</head>
<!-- 使用暗黑系+深紫渐变，极具高级科技感 -->
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-black text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- 主容器，采用毛玻璃效果 -->
    <div class="glass-card max-w-md w-full rounded-3xl shadow-2xl overflow-hidden fade-in">
        
        <!-- 头部 -->
        <div class="p-8 text-center border-b border-white/10 relative overflow-hidden">
            <!-- 装饰性发光球 -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-rose-500 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>
            
            <h1 class="text-2xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-rose-300 to-purple-300 z-10 relative">
                AI 塑颜体态引擎
            </h1>
            <p class="text-xs text-gray-400 mt-2 tracking-wide z-10 relative">Powered by Neural Networks</p>
        </div>

        <div class="p-6">
            <!-- 第 1 阶段：选择与上传 -->
            <div id="step1" class="space-y-6 block">
                
                <!-- 切换面板：面部 VS 体态 -->
                <div class="flex bg-black/30 rounded-xl p-1 relative border border-white/5">
                    <button id="btn-face" onclick="switchType('face')" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white/10 text-white transition-all shadow-lg">
                        ✨ 面容抗衰分析
                    </button>
                    <button id="btn-posture" onclick="switchType('posture')" class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all">
                        🏃‍♀️ 骨相体态评估
                    </button>
                </div>

                <!-- 动态提示语 -->
                <div class="text-center">
                    <p id="upload-hint" class="text-sm text-purple-200">请上传一张清晰的正面五官照片</p>
                </div>
                
                <!-- 高级上传框 -->
                <div class="relative group cursor-pointer">
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                    <div class="border-2 border-dashed border-purple-400/30 rounded-2xl p-10 text-center transition group-hover:border-purple-400/60 group-hover:bg-purple-900/20">
                        <svg class="mx-auto h-12 w-12 text-purple-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="text-sm font-medium text-gray-300 bg-white/5 px-4 py-2 rounded-full backdrop-blur-sm border border-white/10">点击选择本地照片</span>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <button onclick="uploadImage()" class="w-full bg-gradient-to-r from-rose-500 to-purple-600 hover:from-rose-400 hover:to-purple-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.3)] transition-all transform hover:-translate-y-1">
                    启动 AI 引擎深度测算
                </button>
            </div>

            <!-- 第 2 阶段：加载中 (酷炫扫描动画) -->
            <div id="step2" class="hidden flex-col items-center justify-center py-8 space-y-6 fade-in">
                <div class="scan-container w-32 h-32 flex items-center justify-center">
                    <svg class="w-16 h-16 text-purple-300 opacity-20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    <div class="scan-line"></div>
                </div>
                <div class="text-center">
                    <p class="text-purple-300 font-medium tracking-widest text-sm animate-pulse">正在提取面庞几何特征...</p>
                    <p class="text-xs text-gray-500 mt-2">云端计算中，绝不保存图像</p>
                </div>
            </div>

            <!-- 第 3 阶段：结果与引流 -->
            <div id="step3" class="hidden space-y-5 fade-in">
                <div class="text-center">
                    <span class="inline-block bg-purple-500/20 text-purple-300 border border-purple-500/30 px-3 py-1 rounded-full text-xs font-semibold mb-3">测算完成</span>
                    <h2 class="text-xl font-bold text-white" id="report-title">诊断报告</h2>
                </div>

                <!-- 诊断内容卡片 -->
                <div class="glass-card p-5 rounded-2xl space-y-3" id="result-box">
                    <!-- JS动态插入 -->
                </div>

                <!-- 引流 CTA -->
                <div class="bg-gradient-to-br from-indigo-900/40 to-purple-900/40 p-5 rounded-2xl border border-indigo-500/30 mt-6 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-10 text-6xl">✨</div>
                    <h3 class="font-bold text-indigo-200 mb-2">掌控蜕变，从执行开始</h3>
                    <p class="text-xs text-indigo-300/80 mb-4 leading-relaxed">
                        您的诊断已完成。我已经为您整合了对应的 <b>30天抗炎饮食与矫正训练库</b>。告别碎片化焦虑，建立您的自我管理系统。
                    </p>
                    <button onclick="goToNotion()" class="w-full flex items-center justify-center gap-2 bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all transform hover:-translate-y-0.5">
                        一键载入我的 Notion 模板
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 交互逻辑 -->
    <script>
        let currentAnalysisType = 'face'; // 默认是面部

        // 切换 分析类型 面板
        function switchType(type) {
            currentAnalysisType = type;
            const btnFace = document.getElementById('btn-face');
            const btnPosture = document.getElementById('btn-posture');
            const uploadHint = document.getElementById('upload-hint');

            // 切换样式和提示语
            if (type === 'face') {
                btnFace.className = "flex-1 py-2 text-sm font-medium rounded-lg bg-white/10 text-white transition-all shadow-lg";
                btnPosture.className = "flex-1 py-2 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all";
                uploadHint.innerText = "请上传一张清晰的正面五官照片";
            } else {
                btnPosture.className = "flex-1 py-2 text-sm font-medium rounded-lg bg-white/10 text-white transition-all shadow-lg";
                btnFace.className = "flex-1 py-2 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all";
                uploadHint.innerText = "请上传一张紧身衣着、能看清身体曲线的全身照";
            }
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) {
                alert("请先点击虚线框选择一张照片！"); return;
            }

            // 界面切换到扫描中
            document.getElementById('step1').classList.remove('block');
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('step2').classList.add('flex');

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async function () {
                const base64Image = reader.result.split(',')[1];

                try {
                    // 把图片 和 用户选择的类型(type) 一起发给后端
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            image: base64Image, 
                            type: currentAnalysisType // 'face' 或 'posture'
                        })
                    });
                    
                    const data = await response.json();

                    // 渲染结果
                    document.getElementById('report-title').innerText = data.title;
                    document.getElementById('result-box').innerHTML = `
                        <div class="flex justify-between items-center border-b border-white/10 pb-3">
                            <span class="text-gray-300 text-sm">综合状态评分</span>
                            <span class="font-bold text-rose-400 text-lg">${data.score} / 100</span>
                        </div>
                        <p class="text-sm text-gray-300 mt-2">
                            <span class="text-rose-400 font-bold">⚠️ 发现隐患：</span><br/>${data.issue}
                        </p>
                        <p class="text-sm text-gray-300 mt-2">
                            <span class="text-indigo-400 font-bold">💡 改善靶向：</span><br/>${data.suggestion}
                        </p>
                    `;
                    
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step2').classList.remove('flex');
                    document.getElementById('step3').classList.remove('hidden');

                } catch (error) {
                    alert("网络错误或上传的图片过大，请截图压缩后重试。");
                    location.reload();
                }
            };
        }

        function goToNotion() {
            // 请在这里换成你的 Notion 模板链接！
            window.open("https://www.notion.so/你的模板分享链接", "_blank"); 
        }
    </script>
</body>
</html>
