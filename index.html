<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | 颜值与体态极客研究室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-nav { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glow-text { text-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .scan-container { position: relative; overflow: hidden; border-radius: 1rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(to right, transparent, #a855f7, #ec4899, transparent); box-shadow: 0 0 15px #ec4899; animation: scan 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        input[type="radio"] { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans selection:bg-purple-500 selection:text-white">

    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-rose-500 flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(168,85,247,0.5)]">L</div>
                <span class="text-xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">LUMINA</span>
            </div>
            <button onclick="goToNotion()" class="bg-white/10 hover:bg-white/20 border border-white/20 px-5 py-2 rounded-full text-sm font-medium transition-all">
                获取 Notion 模板
            </button>
        </div>
    </nav>

    <section id="hero" class="relative pt-32 pb-20 lg:pt-40 lg:pb-28 overflow-hidden">
        <div class="absolute top-1/4 left-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30"></div>
        <div class="absolute top-1/3 right-0 w-96 h-96 bg-rose-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>

        <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            
            <div class="space-y-8">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-xs font-semibold uppercase tracking-wider">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span></span>
                    真实 AI 视觉引擎运行中
                </div>
                <h1 class="text-5xl lg:text-6xl font-bold leading-tight glow-text">
                    停止精神内耗<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-rose-400">用真实数据重塑你的美</span>
                </h1>
                <p class="text-lg text-gray-400 leading-relaxed max-w-lg">
                    直接调用原生视觉算法，精准输出骨相与体态的像素级落差，并自动生成可落地的 Notion 管理系统。
                </p>
            </div>

            <div class="glass-card p-6 lg:p-8 rounded-3xl relative border-purple-500/30 border">
                <div id="step1" class="space-y-6 block">
                    <div class="flex bg-black/40 rounded-xl p-1 border border-white/10">
                        <button id="btn-posture" onclick="switchType('posture')" class="flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg transition-all">🏃‍♀️ 体态评估</button>
                        <button id="btn-face" onclick="switchType('face')" class="flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all bg-transparent">✨ 面容分析</button>
                    </div>

                    <div id="posture-angle-selector" class="flex flex-col gap-3 justify-center mt-4 bg-purple-900/20 p-4 rounded-xl border border-purple-500/30">
                        <p class="text-xs text-purple-300 font-bold text-center">👇 第一步：请选择你要测算的视角 👇</p>
                        <div class="flex justify-center gap-6">
                            <label class="text-sm font-bold text-gray-100 flex items-center gap-2 cursor-pointer hover:text-purple-300 transition">
                                <input type="radio" name="angle" value="front" checked class="accent-purple-500"> 🧍‍♀️ 正面全身照 (测高低肩)
                            </label>
                            <label class="text-sm font-bold text-gray-100 flex items-center gap-2 cursor-pointer hover:text-rose-300 transition">
                                <input type="radio" name="angle" value="side" class="accent-rose-500"> 🚶‍♀️ 侧面全身照 (测探颈)
                            </label>
                        </div>
                    </div>

                    <div class="text-center"><p id="upload-hint" class="text-sm text-rose-400 font-bold">【硬核要求】：请全身入镜，衣服紧身，背景必须干净无杂物！</p></div>
                    
                    <div class="relative group cursor-pointer">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                        <div id="drop-zone" class="border-2 border-dashed border-purple-500/50 rounded-2xl p-8 text-center transition duration-300 group-hover:border-purple-400 group-hover:bg-purple-900/40 bg-black/40">
                            <svg class="mx-auto h-10 w-10 text-purple-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            <span id="file-name" class="text-base font-bold text-white">点击此处，选取照片</span>
                        </div>
                    </div>

                    <button onclick="processAndUpload()" class="w-full bg-gradient-to-r from-gray-100 to-white text-gray-900 hover:scale-105 font-black py-4 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                        🚀 启动真实云端测算
                    </button>
                </div>

                <div id="step2" class="hidden flex-col items-center justify-center py-10 space-y-6">
                    <div class="scan-container w-32 h-32 flex items-center justify-center"><svg class="w-16 h-16 text-purple-400/30" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg><div class="scan-line"></div></div>
                    <div class="text-center">
                        <p class="text-purple-300 font-medium text-sm animate-pulse">图片已压缩，正在等待百度 AI 返回真实数据...</p>
                    </div>
                </div>

                <div id="step3" class="hidden space-y-5">
                    <div class="text-center"><h2 class="text-2xl font-bold text-white mb-1" id="report-title">诊断报告</h2></div>
                    <div class="bg-black/40 border border-white/5 p-5 rounded-2xl space-y-3" id="result-box"></div>
                    <button onclick="goToNotion()" class="w-full flex items-center justify-center gap-2 bg-purple-500 hover:bg-purple-400 text-white font-bold py-3 rounded-xl transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                        一键部署到我的 Notion
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let currentType = 'posture'; 

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const fileNameDisplay = document.getElementById('file-name');
            const dropZone = document.getElementById('drop-zone');
            if (this.files && this.files[0]) {
                const name = this.files[0].name;
                fileNameDisplay.innerHTML = `<span class="text-emerald-400 font-black text-lg">✅ 已选中: ${name.length > 15 ? name.substring(0,15)+'...' : name}</span>`;
                dropZone.classList.add('border-emerald-500', 'bg-emerald-900/30');
            }
        });

        function switchType(type) {
            currentType = type;
            const btnFace = document.getElementById('btn-face');
            const btnPosture = document.getElementById('btn-posture');
            const uploadHint = document.getElementById('upload-hint');
            const angleSelector = document.getElementById('posture-angle-selector');

            document.getElementById('imageInput').value = "";
            document.getElementById('file-name').innerHTML = "点击此处，选取照片";
            document.getElementById('drop-zone').classList.remove('border-emerald-500', 'bg-emerald-900/30');

            if (type === 'face') {
                btnFace.className = "flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg transition-all";
                btnPosture.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all bg-transparent";
                uploadHint.innerText = "请上传一张清晰的正面五官照片";
                angleSelector.classList.add('hidden'); 
            } else {
                btnPosture.className = "flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg transition-all";
                btnFace.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all bg-transparent";
                uploadHint.innerText = "【硬核要求】：请全身入镜，衣服紧身，背景必须干净无杂物！";
                angleSelector.classList.remove('hidden'); 
                angleSelector.classList.add('flex');
            }
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = Math.round((height *= MAX_WIDTH / width));
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    callback(base64);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function processAndUpload() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) { alert("❌ 请先点击虚线框，选择一张照片！"); return; }

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('step2').classList.add('flex');

            const angle = document.querySelector('input[name="angle"]:checked')?.value || 'front';

            compressImage(fileInput.files[0], async function(compressedBase64) {
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: compressedBase64, type: currentType, angle: angle })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) throw new Error(data.issue || '未知网络错误');

                    document.getElementById('report-title').innerText = data.title;
                    document.getElementById('result-box').innerHTML = `
                        <div class="flex justify-between items-center border-b border-white/10 pb-3">
                            <span class="text-gray-400 text-sm">客观测算评分</span>
                            <span class="font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-purple-400 text-2xl">${data.score}</span>
                        </div>
                        <p class="text-sm text-gray-300 mt-3 whitespace-pre-line"><span class="text-rose-400 font-bold">⚠️ 原始数据解析：</span><br/>${data.issue}</p>
                        <p class="text-sm text-gray-300 mt-3 whitespace-pre-line"><span class="text-purple-400 font-bold">💡 改善建议：</span><br/>${data.suggestion}</p>
                    `;
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step2').classList.remove('flex');
                    document.getElementById('step3').classList.remove('hidden');
                } catch (error) {
                    alert("❌ 测算中断！\n\n拦截原因：\n" + error.message + "\n\n👇 排查指南 👇\n1. 如果提示 Error_code: 17 或 6 等数字，说明你的百度智能云【没有免费领取】接口额度！请登录百度云控制台领取。\n2. 如果提示未能找到人体，请换一张背景完全干净的全身照！");
                    location.reload();
                }
            });
        }

        function goToNotion() { window.open("https://www.notion.so/你的模板分享链接", "_blank"); }
    </script>
</body>
</html>
