<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | 颜值与体态极客研究室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .scan-container { position: relative; overflow: hidden; border-radius: 1rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(to right, transparent, #a855f7, #ec4899, transparent); box-shadow: 0 0 15px #ec4899; animation: scan 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-md w-full p-8 rounded-3xl relative overflow-hidden">
        
        <div id="step1" class="space-y-6 block">
            <h2 class="text-2xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-rose-400 mb-6">Lumina 测算引擎</h2>
            
            <!-- 核心类型选择 -->
            <div class="flex bg-black/40 rounded-xl p-1 border border-white/10">
                <button id="btn-face" onclick="switchType('face')" class="flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg transition-all">✨ 面容分析</button>
                <button id="btn-posture" onclick="switchType('posture')" class="flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all">🏃‍♀️ 体态评估</button>
            </div>

            <!-- 【新增】体态视角的二级选择（默认隐藏） -->
            <div id="posture-angle-selector" class="hidden flex gap-2 justify-center mt-2">
                <label class="text-xs text-gray-400 flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="angle" value="front" checked class="accent-purple-500"> 正面照 (测高低肩/腿型)
                </label>
                <label class="text-xs text-gray-400 flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="angle" value="side" class="accent-rose-500"> 侧面照 (测探颈/圆肩)
                </label>
            </div>

            <div class="text-center mt-4"><p id="upload-hint" class="text-sm text-gray-400">请上传一张清晰的正面五官照片</p></div>
            
            <!-- 上传框 -->
            <div class="relative group cursor-pointer mt-4">
                <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                <div id="drop-zone" class="border-2 border-dashed border-purple-500/30 rounded-2xl p-8 text-center bg-black/20">
                    <span id="file-name" class="text-sm font-medium text-gray-300">点击此处选择图片</span>
                </div>
            </div>

            <button onclick="processAndUpload()" class="w-full bg-white text-gray-900 font-bold py-3.5 px-4 rounded-xl mt-6 transition-all hover:scale-[1.02]">
                生成专属诊断报告
            </button>
        </div>

        <div id="step2" class="hidden flex-col items-center justify-center py-10 space-y-6">
            <div class="scan-container w-32 h-32 flex items-center justify-center"><div class="scan-line"></div></div>
            <p class="text-purple-300 text-sm animate-pulse">正在压缩图片并进行云端测算...</p>
        </div>

        <div id="step3" class="hidden space-y-5">
            <h2 class="text-2xl font-bold text-white mb-1" id="report-title">诊断报告</h2>
            <div class="bg-black/40 border border-white/5 p-5 rounded-2xl space-y-3" id="result-box"></div>
            <button onclick="goToNotion()" class="w-full bg-purple-500 text-white font-bold py-3 rounded-xl mt-4">导入 Notion 改善计划</button>
        </div>
    </div>

    <script>
        let currentType = 'face'; 

        document.getElementById('imageInput').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                document.getElementById('file-name').innerHTML = `<span class="text-emerald-400">✅ 已载入: ${this.files[0].name}</span>`;
            }
        });

        function switchType(type) {
            currentType = type;
            const btnFace = document.getElementById('btn-face');
            const btnPosture = document.getElementById('btn-posture');
            const angleSelector = document.getElementById('posture-angle-selector');
            
            if (type === 'face') {
                btnFace.className = "flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg";
                btnPosture.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white bg-transparent";
                document.getElementById('upload-hint').innerText = "请上传一张清晰的正面五官照片";
                angleSelector.classList.add('hidden');
            } else {
                btnPosture.className = "flex-1 py-2.5 text-sm font-medium rounded-lg bg-gradient-to-r from-purple-600 to-rose-500 text-white shadow-lg";
                btnFace.className = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white bg-transparent";
                document.getElementById('upload-hint').innerText = "请穿着紧身衣，上传全身照";
                angleSelector.classList.remove('hidden'); // 显示正侧面选择器
            }
        }

        // 【核心黑科技】：利用 Canvas 压缩图片，解决过大报错
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // 强制缩小宽度到 800 像素，满足AI且极速上传
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    // 导出为低质量的 JPEG
                    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    callback(base64);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function processAndUpload() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) { alert("请先选择照片！"); return; }

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('step2').classList.add('flex');

            // 获取用户选的是正面还是侧面
            const angle = document.querySelector('input[name="angle"]:checked').value;

            // 调用压缩函数
            compressImage(fileInput.files[0], async function(compressedBase64) {
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            image: compressedBase64, 
                            type: currentType,
                            angle: angle // 把视角参数传给后端
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) throw new Error(data.issue || '测算失败');

                    document.getElementById('report-title').innerText = data.title;
                    document.getElementById('result-box').innerHTML = `
                        <p class="text-sm text-gray-300"><b>诊断分数：</b><span class="text-rose-400 text-xl font-bold">${data.score}</span></p>
                        <p class="text-sm text-gray-300 mt-2"><span class="text-rose-400 font-bold">⚠️ 问题分析：</span><br/>${data.issue}</p>
                        <p class="text-sm text-gray-300 mt-2"><span class="text-purple-400 font-bold">💡 改善建议：</span><br/>${data.suggestion}</p>
                    `;
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step2').classList.remove('flex');
                    document.getElementById('step3').classList.remove('hidden');
                } catch (error) {
                    alert("测算异常：" + error.message);
                    location.reload();
                }
            });
        }

        function goToNotion() { window.open("https://www.notion.so/你的模板分享链接", "_blank"); }
    </script>
</body>
</html>
